<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShipPulse Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono&display=swap" rel="stylesheet">
<style>
/* ── Theme tokens ──────────────────────────────────────────────── */
:root {
  --bg-page: #FAF8F5;
  --bg-surface: #fff;
  --bg-surface-alt: #FAF8F5;
  --bg-column-header: #f5f0e8;
  --text-primary: #3A3226;
  --text-secondary: #8b8072;
  --text-tertiary: #5a5045;
  --border: #D4C4A0;
  --border-light: #eee;
  --shadow: rgba(58, 50, 38, .1);
  --shadow-heavy: rgba(58, 50, 38, .15);
  --overlay: rgba(58, 50, 38, .5);

  /* Header */
  --header-bg: #6B7F3B;
  --header-border: #5a6b32;
  --header-select-bg: #5a6b32;
  --header-select-border: #4a5a28;

  /* Accents — shared across themes */
  --accent-green: #6B7F3B;
  --accent-green-subtle: #6B7F3B22;
  --accent-teal: #3a9e8a;
  --accent-teal-subtle: #8ECFC033;
  --accent-orange: #E8845C;
  --accent-orange-subtle: #E8845C22;
  --accent-muted: #D4C4A044;
  --accent-orange-faint: #E8845C11;
  --accent-highlight: #D4E8A0;

  /* Pre/code */
  --bg-code: #FAF8F5;
}

[data-theme="dark"] {
  --bg-page: #1a1917;
  --bg-surface: #262521;
  --bg-surface-alt: #1f1e1b;
  --bg-column-header: #2a2926;
  --text-primary: #e0d8ce;
  --text-secondary: #9a9088;
  --text-tertiary: #b0a89e;
  --border: #3d3a34;
  --border-light: #333;
  --shadow: rgba(0, 0, 0, .25);
  --shadow-heavy: rgba(0, 0, 0, .4);
  --overlay: rgba(0, 0, 0, .6);

  --header-bg: #2d3320;
  --header-border: #3a4228;
  --header-select-bg: #3a4228;
  --header-select-border: #4a5438;

  --accent-green: #8fa74e;
  --accent-green-subtle: rgba(143, 167, 78, .15);
  --accent-teal: #6bc4b0;
  --accent-teal-subtle: rgba(107, 196, 176, .15);
  --accent-orange: #e8955f;
  --accent-orange-subtle: rgba(232, 149, 95, .15);
  --accent-muted: rgba(255, 255, 255, .06);
  --accent-orange-faint: rgba(232, 149, 95, .08);
  --accent-highlight: #b5cc80;

  --bg-code: #1f1e1b;
}

/* ── Auto dark mode when no explicit preference ───────────────── */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg-page: #1a1917;
    --bg-surface: #262521;
    --bg-surface-alt: #1f1e1b;
    --bg-column-header: #2a2926;
    --text-primary: #e0d8ce;
    --text-secondary: #9a9088;
    --text-tertiary: #b0a89e;
    --border: #3d3a34;
    --border-light: #333;
    --shadow: rgba(0, 0, 0, .25);
    --shadow-heavy: rgba(0, 0, 0, .4);
    --overlay: rgba(0, 0, 0, .6);

    --header-bg: #2d3320;
    --header-border: #3a4228;
    --header-select-bg: #3a4228;
    --header-select-border: #4a5438;

    --accent-green: #8fa74e;
    --accent-green-subtle: rgba(143, 167, 78, .15);
    --accent-teal: #6bc4b0;
    --accent-teal-subtle: rgba(107, 196, 176, .15);
    --accent-orange: #e8955f;
    --accent-orange-subtle: rgba(232, 149, 95, .15);
    --accent-muted: rgba(255, 255, 255, .06);
    --accent-orange-faint: rgba(232, 149, 95, .08);
    --accent-highlight: #b5cc80;

    --bg-code: #1f1e1b;
  }
}

/* ── Base ──────────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-page);color:var(--text-primary);min-height:100vh}
header{background:var(--header-bg);border-bottom:2px solid var(--header-border);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header img{height:36px;border-radius:6px}
header h1{font-family:'Inter',sans-serif;font-size:22px;font-weight:600;color:#fff;letter-spacing:0}
header h1 span{color:var(--accent-highlight)}
select{background:var(--header-select-bg);color:#fff;border:1px solid var(--header-select-border);border-radius:6px;padding:6px 12px;font-size:14px;cursor:pointer}
select option{background:var(--header-select-bg);color:#fff}
select:focus{outline:none;border-color:#8ECFC0}

/* ── Theme toggle ─────────────────────────────────────────────── */
.theme-toggle{background:none;border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;cursor:pointer;padding:5px 8px;font-size:16px;line-height:1;transition:border-color .15s}
.theme-toggle:hover{border-color:rgba(255,255,255,.5)}

/* ── Board ─────────────────────────────────────────────────────── */
.board{display:flex;gap:16px;padding:24px;overflow-x:auto;min-height:calc(100vh - 165px)}
.column{min-width:240px;flex:1;background:var(--bg-surface);border:none;border-radius:8px;display:flex;flex-direction:column;box-shadow:0 2px 8px var(--shadow)}
.column-header{padding:12px 16px;border-bottom:1px solid var(--border-light);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--accent-green);background:var(--bg-column-header);border-radius:8px 8px 0 0}
.column-header .count{background:var(--accent-green);color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;margin-left:8px}
.cards{padding:8px;flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto}

/* ── Cards ─────────────────────────────────────────────────────── */
.card{background:var(--bg-surface-alt);border:1px solid var(--border);border-radius:6px;padding:12px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:var(--accent-orange);box-shadow:0 2px 8px var(--accent-orange-subtle)}
.card-title{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{font-size:11px;color:var(--text-secondary);display:flex;justify-content:space-between;align-items:center}
.card-links{display:flex;gap:8px;margin-top:7px;flex-wrap:wrap}
.card-link{font-size:11px;color:var(--accent-teal);text-decoration:none;border:1px solid var(--border);border-radius:999px;padding:2px 7px;background:var(--bg-surface)}
.card-link:hover{border-color:var(--accent-teal)}
.card.done{border-left:3px solid var(--accent-green)}
.card.failed,.card.error{border-left:3px solid var(--accent-orange)}

/* ── Overlay / Panel ───────────────────────────────────────────── */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--overlay);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}
.overlay.open{opacity:1;pointer-events:auto}
.panel{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;width:90%;max-width:640px;max-height:85vh;overflow-y:auto;padding:24px;position:relative;box-shadow:0 8px 32px var(--shadow-heavy)}
.panel-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px}
.panel-close:hover{color:var(--text-primary);background:var(--bg-column-header)}
.panel h2{font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:4px;padding-right:40px}
.panel-task{font-size:13px;color:var(--text-secondary);margin-bottom:16px;white-space:pre-wrap;word-break:break-word;max-height:120px;overflow-y:auto;line-height:1.5}
.panel-meta{display:flex;gap:12px;margin-bottom:20px;font-size:12px;color:var(--text-secondary);flex-wrap:wrap}
.panel-meta span{display:flex;align-items:center;gap:4px}
.panel-actions{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.share-btn{border:1px solid var(--border);background:var(--bg-surface-alt);color:var(--text-primary);padding:7px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.share-btn:hover{border-color:var(--accent-teal)}
.share-btn:disabled{opacity:.7;cursor:wait}
.control-btn{border:1px solid var(--border);background:var(--bg-surface-alt);color:var(--text-primary);padding:7px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.control-btn:hover{border-color:var(--accent-green)}
.control-btn.warn:hover{border-color:var(--accent-orange)}
.control-btn:disabled{opacity:.7;cursor:wait}
.share-status{font-size:12px;color:var(--accent-teal);min-height:16px}

/* ── Steps ─────────────────────────────────────────────────────── */
.steps-list{display:flex;flex-direction:column;gap:8px}
.step-row{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg-surface-alt);border:1px solid var(--border);border-radius:6px}
.step-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.step-icon.done{background:var(--accent-green-subtle);color:var(--accent-green)}
.step-icon.running{background:var(--accent-teal-subtle);color:var(--accent-teal)}
.step-icon.pending{background:var(--accent-muted);color:var(--text-secondary)}
.step-icon.waiting{background:var(--accent-muted);color:var(--text-secondary)}
.step-icon.failed,.step-icon.error{background:var(--accent-orange-subtle);color:var(--accent-orange)}
.step-name{font-size:13px;font-weight:500;color:var(--text-primary);flex:1}
.step-agent{font-size:11px;color:var(--text-secondary);font-family:'Geist Mono',monospace}
.step-status{font-size:11px;text-transform:uppercase;font-weight:600}

/* ── Badges ────────────────────────────────────────────────────── */
.badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.badge-running{background:var(--accent-teal-subtle);color:var(--accent-teal)}
.badge-done,.badge-completed{background:var(--accent-green-subtle);color:var(--accent-green)}
.badge-failed,.badge-error{background:var(--accent-orange-subtle);color:var(--accent-orange)}
.badge-cancelled{background:var(--accent-orange-faint);color:var(--accent-orange)}
.badge-waiting{background:var(--accent-muted);color:var(--text-secondary)}
.badge-pending{background:var(--accent-muted);color:var(--text-secondary)}
.badge-blocked{background:var(--accent-orange-faint);color:var(--accent-orange)}
.badge-warning{background:#fbbf2433;color:#a16207}
.badge-critical{background:#f8717133;color:#b91c1c}

/* ── Run health ─────────────────────────────────────────────────── */
.run-health{margin-bottom:16px;padding:12px;border:1px solid var(--border);border-radius:8px;background:var(--bg-surface-alt)}
.run-health-title{font-size:12px;font-weight:600;color:var(--text-primary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
.run-health-list{display:flex;flex-direction:column;gap:8px}
.run-health-row{display:grid;grid-template-columns:auto auto 1fr;gap:8px;align-items:flex-start;padding:8px 9px;border-radius:6px;background:var(--bg-surface)}
.run-health-row.warning{border-left:3px solid #f59e0b}
.run-health-row.critical{border-left:3px solid #ef4444}
.run-health-text{font-size:12px;color:var(--text-primary);line-height:1.4}

/* ── Live Thinking Stream ─────────────────────────────────────── */
.thinking-window{margin-top:24px;border-top:1px solid var(--border);padding-top:20px}
.thinking-header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.thinking-live{display:flex;align-items:center;gap:6px;font-family:'Geist Mono',monospace;font-size:11px;color:var(--text-secondary)}
.thinking-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.thinking-dot.is-live{background:var(--accent-teal);box-shadow:0 0 8px var(--accent-teal-subtle);animation:pulse 1.6s ease-in-out infinite}
.thinking-summary{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.thinking-summary-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg-surface-alt)}
.thinking-summary-agent{font-family:'Geist Mono',monospace;font-size:11px;color:var(--accent-teal);white-space:nowrap}
.thinking-summary-text{font-size:12px;color:var(--text-primary);line-height:1.4}
.thinking-summary-time{font-family:'Geist Mono',monospace;font-size:11px;color:var(--text-secondary);white-space:nowrap}
.thinking-stream{max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;background:var(--bg-surface-alt);padding:8px}
.thinking-row{display:flex;flex-direction:column;gap:4px;padding:8px 10px;border-radius:8px;background:var(--bg-surface);border:1px solid var(--border-light);margin-bottom:8px}
.thinking-row:last-child{margin-bottom:0}
.thinking-row.lane-think{border-left:3px solid var(--text-secondary)}
.thinking-row.lane-explore{border-left:3px solid var(--accent-teal)}
.thinking-row.lane-build{border-left:3px solid var(--accent-green)}
.thinking-row.lane-verify{border-left:3px solid #c59b2a}
.thinking-row.lane-handoff{border-left:3px solid #6c63ff}
.thinking-row.lane-blocked{border-left:3px solid var(--accent-orange)}
.thinking-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.thinking-agent{font-family:'Geist Mono',monospace;font-size:11px;color:var(--accent-teal)}
.thinking-lane{font-family:'Geist Mono',monospace;font-size:10px;padding:1px 6px;border-radius:999px;border:1px solid var(--border);color:var(--text-secondary);text-transform:uppercase}
.thinking-time{font-family:'Geist Mono',monospace;font-size:10px;color:var(--text-secondary)}
.thinking-message{font-size:12px;color:var(--text-primary);line-height:1.45}
.thinking-detail{font-size:11px;color:var(--text-secondary);line-height:1.4}
.thinking-empty{font-size:12px;color:var(--text-secondary);padding:10px 8px;text-align:center}

/* ── Misc ──────────────────────────────────────────────────────── */
.empty{color:var(--text-secondary);font-size:12px;text-align:center;padding:24px 8px}
.refresh-note{color:rgba(255,255,255,.6);font-size:11px;margin-left:auto}
@media(max-width:768px){.board{flex-direction:column}.column{min-width:unset}}
@media(max-width:768px){
  .quickstart-row{flex-direction:column}
  .run-btn{width:100%}
}
.story-open{display:block!important}
.story-chevron-open{transform:rotate(90deg)}
.step-open{display:block!important}
.step-chevron-open{transform:rotate(90deg)}

/* ── Quick Start ────────────────────────────────────────────────── */
.quickstart{padding:14px 24px;border-bottom:1px solid var(--border-light);background:var(--bg-surface);display:flex;flex-direction:column;gap:10px}
.quickstart-row{display:flex;gap:10px;align-items:flex-start}
.idea-input{flex:1;min-height:74px;max-height:180px;resize:vertical;border:1px solid var(--border);background:var(--bg-surface-alt);color:var(--text-primary);border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.45;font-family:'Inter',sans-serif}
.idea-input:focus{outline:none;border-color:var(--accent-teal);box-shadow:0 0 0 3px var(--accent-teal-subtle)}
.run-btn{border:1px solid var(--accent-green);background:var(--accent-green);color:#fff;padding:9px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;min-width:120px}
.run-btn:hover{filter:brightness(1.05)}
.run-btn:disabled{opacity:.7;cursor:wait}
.quickstart-meta{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
.quickstart-hint{font-size:12px;color:var(--text-secondary)}
.quickstart-status{font-size:12px;min-height:16px;color:var(--accent-teal)}
.intent-recommendation{font-size:12px;min-height:16px;color:var(--accent-teal);width:100%}
.intent-recommendation.warn{color:var(--accent-orange)}
.quickstart-options{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.quickstart-option{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary)}
.quickstart-option input{accent-color:var(--accent-teal)}
.token-row{display:flex;align-items:center;gap:8px}
.token-input{width:240px;max-width:100%;border:1px solid var(--border);background:var(--bg-surface-alt);color:var(--text-primary);border-radius:6px;padding:6px 8px;font-size:12px}
.token-input:focus{outline:none;border-color:var(--accent-teal)}
.token-btn{border:1px solid var(--border);background:var(--bg-surface-alt);color:var(--text-primary);padding:6px 9px;border-radius:6px;font-size:12px;cursor:pointer}
.token-btn:hover{border-color:var(--accent-teal)}

/* ── Medic indicator ───────────────────────────────────────────── */
.medic-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.85);cursor:pointer;padding:4px 10px;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:transparent;transition:border-color .15s,background .15s}
.medic-badge:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.05)}
.medic-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.medic-dot.healthy{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.5);animation:pulse 2s infinite}
.medic-dot.warning{background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.5)}
.medic-dot.critical{background:#f87171;box-shadow:0 0 6px rgba(248,113,113,.5);animation:pulse 1s infinite}
.medic-dot.unknown{background:#9ca3af}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.medic-panel{position:fixed;top:60px;right:16px;width:340px;max-height:500px;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 32px var(--shadow-heavy);z-index:50;overflow:hidden;display:none;flex-direction:column}
.medic-panel.open{display:flex}
.medic-panel-header{padding:14px 16px;border-bottom:1px solid var(--border-light);font-size:14px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.medic-panel-body{padding:12px 16px;overflow-y:auto;flex:1}
.medic-stat{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;color:var(--text-secondary);border-bottom:1px solid var(--border-light)}
.medic-stat:last-child{border-bottom:none}
.medic-stat-value{font-weight:600;color:var(--text-primary)}
.medic-check-row{padding:8px 0;border-bottom:1px solid var(--border-light);font-size:11px;line-height:1.5}
.medic-check-row:last-child{border-bottom:none}
.medic-check-time{color:var(--text-secondary);font-family:'Geist Mono',monospace}
.medic-check-summary{color:var(--text-primary);margin-left:8px}
</style>
</head>
<body>
<header>
  <h1><span>shippulse</span> dashboard</h1>
  <select id="wf-select"><option value="">Loading...</option></select>
  <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle light/dark mode">☀️</button>
  <div class="medic-badge" id="medic-badge" onclick="toggleMedicPanel()" title="Medic watchdog status">
    <span class="medic-dot unknown" id="medic-dot"></span>
    <span id="medic-label">Medic</span>
  </div>
  <span class="refresh-note" id="refresh-note">Auto-refresh: 30s</span>
</header>
<div class="quickstart">
  <div class="quickstart-row">
    <textarea id="idea-input" class="idea-input" placeholder="Describe your project idea (goal, users, constraints)."></textarea>
    <button id="run-btn" class="run-btn" onclick="startIdeaRun()">Start Run</button>
  </div>
  <div class="quickstart-options">
    <label class="quickstart-option" title="Start project-gap-analysis first, then auto-launch feature-dev with generated missing capabilities">
      <input id="sequential-orchestration" type="checkbox">
      <span>Sequential orchestration (gap analysis -> implementation)</span>
    </label>
  </div>
  <div class="quickstart-meta">
    <span class="quickstart-hint" id="quickstart-hint">Select a workflow, then start from an idea.</span>
    <span class="quickstart-status" id="quickstart-status"></span>
    <span class="intent-recommendation" id="intent-recommendation"></span>
    <div class="token-row" id="token-row" style="display:none">
      <input id="dashboard-token-input" class="token-input" type="password" placeholder="Dashboard token" autocomplete="off">
      <button class="token-btn" id="dashboard-token-save" onclick="saveDashboardToken()">Save token</button>
    </div>
  </div>
</div>
<div class="board" id="board"><div class="empty" style="margin:auto">Select a workflow</div></div>
<div class="medic-panel" id="medic-panel">
  <div class="medic-panel-header">Workflow Medic</div>
  <div class="medic-panel-body" id="medic-panel-body">Loading...</div>
</div>
<div class="overlay" id="overlay" onclick="if(event.target===this)closePanel()">
  <div class="panel" id="panel"></div>
</div>

<script>
const API = '';
const DASHBOARD_TOKEN_KEY = 'shippulse-dashboard-token';
let workflows = [];
let currentWf = null;
let currentRunId = null;
let panelRefreshInterval = null;
let shareFeedbackTimer = null;
let runEventsSource = null;
let panelRefreshQueued = null;
let pendingArtifactSection = null;
let dashboardConfig = { mutationAuthRequired: false, tokenPath: '' };
let manualWorkflowSelection = false;
let currentIntentRecommendation = null;
let intentRefreshTimer = null;
let currentNextPhaseSuggestion = null;
let thinkingScrollTopByRun = new Map();
let thinkingStickBottomByRun = new Map();

function refreshSequentialOrchestrationOption() {
  const option = document.getElementById('sequential-orchestration');
  if (!option) return;
  const selectedWorkflowId = currentWorkflowIdForStart() || '';
  const recommendedWorkflowId = currentIntentRecommendation && currentIntentRecommendation.workflowId
    ? String(currentIntentRecommendation.workflowId)
    : '';
  const suggested = selectedWorkflowId === 'feature-dev' && recommendedWorkflowId === 'project-gap-analysis';
  option.disabled = !suggested;
  if (!suggested) option.checked = false;
}

function getDashboardToken() {
  return (window.localStorage.getItem(DASHBOARD_TOKEN_KEY) || '').trim();
}

function setDashboardToken(token) {
  if (token && token.trim()) {
    window.localStorage.setItem(DASHBOARD_TOKEN_KEY, token.trim());
  } else {
    window.localStorage.removeItem(DASHBOARD_TOKEN_KEY);
  }
}

function buildAuthHeaders(method, incoming) {
  const headers = new Headers(incoming || {});
  const m = (method || 'GET').toUpperCase();
  if (m !== 'GET' && m !== 'HEAD') {
    const token = getDashboardToken();
    if (token) headers.set('Authorization', `Bearer ${token}`);
  }
  return headers;
}

async function fetchJSON(url, options) {
  const method = options && options.method ? options.method : 'GET';
  const requestInit = options ? { ...options } : {};
  requestInit.headers = buildAuthHeaders(method, options && options.headers);
  const r = await fetch(API + url, requestInit);
  const raw = await r.text();
  let parsed = null;
  if (raw) {
    try { parsed = JSON.parse(raw); } catch { parsed = null; }
  }
  if (!r.ok) {
    const message = (parsed && typeof parsed.error === 'string' && parsed.error) || raw || `Request failed: ${r.status}`;
    throw new Error(message);
  }
  return parsed;
}

function normalizeArtifactSection(section) {
  if (!section) return null;
  const normalized = String(section).trim().toLowerCase();
  if (normalized === 'epics' || normalized === 'features' || normalized === 'stories') return normalized;
  return null;
}

function artifactAnchorId(section) {
  const normalized = normalizeArtifactSection(section);
  return normalized ? `artifact-${normalized}` : null;
}

function setRunQuery(runId, artifactSection) {
  const next = new URL(window.location.href);
  if (runId) next.searchParams.set('run', runId);
  else next.searchParams.delete('run');
  const normalized = normalizeArtifactSection(artifactSection);
  if (normalized) next.searchParams.set('artifact', normalized);
  else next.searchParams.delete('artifact');
  window.history.replaceState({}, '', next.pathname + next.search + next.hash);
}

function setShareStatus(message, isError = false) {
  const status = document.getElementById('share-status');
  if (!status) return;
  status.textContent = message;
  status.style.color = isError ? 'var(--accent-orange)' : 'var(--accent-teal)';
  if (shareFeedbackTimer) clearTimeout(shareFeedbackTimer);
  if (message) {
    shareFeedbackTimer = setTimeout(() => {
      const el = document.getElementById('share-status');
      if (el) el.textContent = '';
    }, 2500);
  }
}

function setPanelStatus(message, isError = false) {
  const status = document.getElementById('panel-status');
  if (!status) return;
  status.textContent = message;
  status.style.color = isError ? 'var(--accent-orange)' : 'var(--accent-teal)';
  if (message) {
    setTimeout(() => {
      const el = document.getElementById('panel-status');
      if (el && el.textContent === message) el.textContent = '';
    }, 3000);
  }
}

function setQuickstartStatus(message, isError = false) {
  const status = document.getElementById('quickstart-status');
  if (!status) return;
  status.textContent = message;
  status.style.color = isError ? 'var(--accent-orange)' : 'var(--accent-teal)';
}

function setIntentRecommendation(message, isWarn = false) {
  const el = document.getElementById('intent-recommendation');
  if (!el) return;
  el.textContent = message || '';
  el.classList.toggle('warn', !!(message && isWarn));
}

function queueIntentRecommendationRefresh() {
  if (intentRefreshTimer) clearTimeout(intentRefreshTimer);
  intentRefreshTimer = setTimeout(() => {
    refreshIntentRecommendation().catch(() => {});
  }, 220);
}

async function refreshIntentRecommendation() {
  const ideaEl = document.getElementById('idea-input');
  const task = ideaEl ? ideaEl.value.trim() : '';
  const selectedWorkflowId = currentWorkflowIdForStart() || '';
  if (!task) {
    currentIntentRecommendation = null;
    setIntentRecommendation('');
    refreshSequentialOrchestrationOption();
    return;
  }

  const query = `/api/workflows/recommend?task=${encodeURIComponent(task)}&selectedWorkflowId=${encodeURIComponent(selectedWorkflowId)}`;
  const payload = await fetchJSON(query);
  const recommendation = payload && payload.recommendation ? payload.recommendation : null;
  currentIntentRecommendation = recommendation;

  if (!recommendation) {
    setIntentRecommendation('');
    refreshSequentialOrchestrationOption();
    return;
  }

  const mismatch = !!(selectedWorkflowId && recommendation.workflowId !== selectedWorkflowId);
  if (mismatch && !manualWorkflowSelection) {
    const sel = document.getElementById('wf-select');
    if (sel && sel.value !== recommendation.workflowId) {
      sel.value = recommendation.workflowId;
      await selectWorkflow(recommendation.workflowId);
    }
  }

  const message = `Recommended workflow: ${recommendation.workflowId} (${recommendation.confidence}) — ${recommendation.reason}`;
  setIntentRecommendation(message, !!(mismatch && manualWorkflowSelection));
  refreshSequentialOrchestrationOption();
}

function refreshTokenUi() {
  const row = document.getElementById('token-row');
  const input = document.getElementById('dashboard-token-input');
  if (!row || !input) return;
  const required = !!dashboardConfig.mutationAuthRequired;
  row.style.display = required ? 'flex' : 'none';
  if (required) {
    input.value = getDashboardToken();
    if (!getDashboardToken()) {
      const hint = dashboardConfig.tokenPath
        ? `Dashboard token required. Read token from ${dashboardConfig.tokenPath}.`
        : 'Dashboard token required for start/stop/resume/retry actions.';
      setQuickstartStatus(hint);
    }
  }
}

async function loadDashboardConfig() {
  try {
    const cfg = await fetchJSON('/api/dashboard/config');
    dashboardConfig = {
      mutationAuthRequired: !!(cfg && cfg.mutationAuthRequired),
      tokenPath: (cfg && typeof cfg.tokenPath === 'string') ? cfg.tokenPath : '',
    };
  } catch {
    dashboardConfig = { mutationAuthRequired: false, tokenPath: '' };
  }
  refreshTokenUi();
}

function saveDashboardToken() {
  const input = document.getElementById('dashboard-token-input');
  if (!input) return;
  setDashboardToken(input.value || '');
  if (dashboardConfig.mutationAuthRequired && !getDashboardToken()) {
    setQuickstartStatus('Token cleared. Mutations are locked until token is set.', true);
    return;
  }
  setQuickstartStatus('Dashboard token saved.');
}

function currentWorkflowIdForStart() {
  const selected = document.getElementById('wf-select').value;
  if (selected) return selected;
  const preferred = workflows.find(w => w.id === 'idea-to-project') || workflows.find(w => w.id === 'product-planning');
  return preferred ? preferred.id : workflows[0]?.id;
}

function updateQuickstartHint() {
  const hint = document.getElementById('quickstart-hint');
  if (!hint) return;
  const workflowId = currentWorkflowIdForStart();
  if (!workflowId) {
    hint.textContent = 'No workflows available. Install workflows first.';
    return;
  }
  const workflow = workflows.find(w => w.id === workflowId);
  hint.textContent = `Run target: ${workflow ? workflow.name : workflowId}`;
  refreshSequentialOrchestrationOption();
}

async function startIdeaRun() {
  const ideaEl = document.getElementById('idea-input');
  const btn = document.getElementById('run-btn');
  const task = ideaEl.value.trim();
  if (!task) {
    setQuickstartStatus('Enter a project idea first.', true);
    return;
  }

  const workflowId = currentWorkflowIdForStart();
  if (!workflowId) {
    setQuickstartStatus('No workflow selected.', true);
    return;
  }
  const intentMismatch = !!(
    currentIntentRecommendation &&
    currentIntentRecommendation.workflowId &&
    currentIntentRecommendation.workflowId !== workflowId
  );
  const recommendedWorkflowId = intentMismatch
    ? String(currentIntentRecommendation.workflowId || '').trim()
    : '';
  const sequentialOrchestrationEnabled = !!document.getElementById('sequential-orchestration')?.checked;
  const sequentialOrchestration = sequentialOrchestrationEnabled
    && workflowId === 'feature-dev'
    && recommendedWorkflowId === 'project-gap-analysis';
  const effectiveWorkflowId = (intentMismatch && !manualWorkflowSelection && recommendedWorkflowId)
    ? (sequentialOrchestration ? workflowId : recommendedWorkflowId)
    : workflowId;
  const noIntentGuard = !sequentialOrchestration && intentMismatch && manualWorkflowSelection;

  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = 'Starting...';
  setQuickstartStatus('');

  try {
    const run = await fetchJSON('/api/runs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ workflowId: effectiveWorkflowId, task, noIntentGuard, sequentialOrchestration }),
    });
    ideaEl.value = '';
    if (run.orchestration && run.orchestration.mode === 'sequential') {
      setQuickstartStatus(`Run #${run.runNumber || 'new'} started in sequential mode: ${run.orchestration.entryWorkflowId} -> ${run.orchestration.nextWorkflowId}.`);
    } else if (run.intentWarning) {
      setQuickstartStatus(`Run #${run.runNumber || 'new'} started. ${String(run.intentWarning)}`);
    } else if (effectiveWorkflowId !== workflowId && !manualWorkflowSelection) {
      setQuickstartStatus(`Run #${run.runNumber || 'new'} started. Auto-switched to ${effectiveWorkflowId} based on task intent.`);
    } else if (noIntentGuard) {
      setQuickstartStatus(`Run #${run.runNumber || 'new'} started (manual workflow override).`);
    } else {
      setQuickstartStatus(`Run #${run.runNumber || 'new'} started.`);
    }
    const sel = document.getElementById('wf-select');
    sel.value = run.workflowId;
    manualWorkflowSelection = false;
    await selectWorkflow(run.workflowId);
    await openRun(run.id);
  } catch (err) {
    setQuickstartStatus(err && err.message ? err.message : 'Could not start run.', true);
  } finally {
    btn.disabled = false;
    btn.textContent = original || 'Start Run';
  }
}

function queuePanelRefresh() {
  if (!currentRunId) return;
  if (panelRefreshQueued) return;
  panelRefreshQueued = setTimeout(async () => {
    panelRefreshQueued = null;
    if (!currentRunId) return;
    try { await refreshPanel(); } catch { /* noop */ }
    if (currentWf) {
      try { await loadRuns(); } catch { /* noop */ }
    }
  }, 220);
}

function connectRunEventStream(runId) {
  if (runEventsSource) {
    try { runEventsSource.close(); } catch {}
    runEventsSource = null;
  }
  if (typeof EventSource === 'undefined') return;
  try {
    runEventsSource = new EventSource(`/api/runs/${runId}/events/stream`);
    runEventsSource.addEventListener('run-event', () => queuePanelRefresh());
    runEventsSource.onerror = () => {
      // Keep polling fallback alive if stream disconnects.
    };
  } catch {
    runEventsSource = null;
  }
}

async function invokeRunAction(action) {
  if (!currentRunId) return;
  const actionMap = {
    stop: { id: 'action-stop-btn', path: 'stop' },
    resume: { id: 'action-resume-btn', path: 'resume' },
    retryStory: { id: 'action-retry-btn', path: 'retry-story' },
  };
  const config = actionMap[action];
  if (!config) return;
  const confirmation = {
    stop: 'Stop this run now?',
    resume: 'Resume this failed run?',
    retryStory: 'Retry the next failed story?',
  };
  if (confirmation[action] && !window.confirm(confirmation[action])) return;

  const btn = document.getElementById(config.id);
  const original = btn ? btn.textContent : '';
  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Working...';
  }
  setPanelStatus('');

  try {
    const result = await fetchJSON(`/api/runs/${currentRunId}/${config.path}`, { method: 'POST' });
    await refreshPanel();
    if (currentWf) await loadRuns();
    if (result && result.message) setPanelStatus(result.message);
    else setPanelStatus('Run updated.');
  } catch (err) {
    setPanelStatus(err && err.message ? err.message : 'Action failed.', true);
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = original || 'Action';
    }
  }
}

async function applyNextPhase() {
  if (!currentNextPhaseSuggestion) return;
  const wfId = String(currentNextPhaseSuggestion.workflowId || '').trim();
  const taskDraft = String(currentNextPhaseSuggestion.taskDraft || '').trim();
  if (!wfId) return;

  const sel = document.getElementById('wf-select');
  const ideaInput = document.getElementById('idea-input');
  if (sel) sel.value = wfId;
  manualWorkflowSelection = false;
  await selectWorkflow(wfId);
  if (ideaInput) {
    ideaInput.value = taskDraft;
    ideaInput.focus();
  }
  closePanel();
  setQuickstartStatus(`Switched to ${wfId}. Review the drafted task and click Start Run.`);
  queueIntentRecommendationRefresh();
}

async function loadWorkflows() {
  await loadDashboardConfig();
  workflows = await fetchJSON('/api/workflows');
  const sel = document.getElementById('wf-select');
  sel.innerHTML = '';
  const defaultOpt = document.createElement('option');
  defaultOpt.value = '';
  defaultOpt.textContent = '— select workflow —';
  sel.appendChild(defaultOpt);
  for (const workflow of workflows) {
    const opt = document.createElement('option');
    opt.value = String(workflow.id || '');
    opt.textContent = String(workflow.name || workflow.id || '');
    sel.appendChild(opt);
  }

  if (await restoreRunFromUrl()) return;

  if (workflows.length === 1) {
    sel.value = workflows[0].id;
    await selectWorkflow(workflows[0].id);
  } else if (workflows.length > 1) {
    const preferred = workflows.find(w => w.id === 'idea-to-project') || workflows.find(w => w.id === 'product-planning');
    if (preferred) sel.value = preferred.id;
    // Auto-select workflow with active runs
    try {
      for (const w of workflows) {
        const runs = await fetchJSON(`/api/runs?workflow=${w.id}`);
        const active = runs.find(r => r.status === 'running' || r.status === 'pending');
        if (active) { sel.value = w.id; await selectWorkflow(w.id); break; }
      }
    } catch {}
    if (!currentWf && sel.value) await selectWorkflow(sel.value);
  }
  updateQuickstartHint();
  queueIntentRecommendationRefresh();
}

async function restoreRunFromUrl() {
  const runId = new URLSearchParams(window.location.search).get('run');
  const artifactSection = normalizeArtifactSection(new URLSearchParams(window.location.search).get('artifact'));
  if (!runId) return false;
  try {
    const run = await fetchJSON(`/api/runs/${runId}`);
    const wf = workflows.find(w => w.id === run.workflow_id);
    if (!wf) return false;
    const sel = document.getElementById('wf-select');
    sel.value = wf.id;
    await selectWorkflow(wf.id);
    await openRun(run.id, artifactSection);
    return true;
  } catch {
    return false;
  }
}

async function selectWorkflow(id) {
  currentWf = workflows.find(w => w.id === id) || null;
  if (currentWf) await loadRuns();
  else document.getElementById('board').innerHTML = '<div class="empty" style="margin:auto">Select a workflow</div>';
  updateQuickstartHint();
  queueIntentRecommendationRefresh();
}

async function loadRuns() {
  if (!currentWf) return;
  const runs = await fetchJSON(`/api/runs?workflow=${currentWf.id}`);
  renderBoard(currentWf, runs);
}

function parseJsonOrNull(raw) {
  if (!raw) return null;
  if (typeof raw === 'object') return raw;
  if (typeof raw !== 'string') return null;
  try { return JSON.parse(raw); } catch { return null; }
}

function artifactCountsForRun(run) {
  const out = { epics: 0, features: 0, stories: 0 };
  const planning = parseJsonOrNull(run.planning_artifacts);
  if (planning && typeof planning === 'object') {
    if (Array.isArray(planning.epics)) out.epics = planning.epics.length;
    if (Array.isArray(planning.features)) out.features = planning.features.length;
    if (Array.isArray(planning.featuresByEpic) && out.features === 0) {
      out.features = planning.featuresByEpic.reduce((sum, row) => sum + (Array.isArray(row.features) ? row.features.length : 0), 0);
    }
    if (Array.isArray(planning.stories)) out.stories = planning.stories.length;
  }
  if (out.epics || out.features || out.stories) return out;

  const context = parseJsonOrNull(run.context);
  if (!context || typeof context !== 'object') return out;
  try {
    const epics = parseJsonOrNull(context.epics_json);
    if (Array.isArray(epics)) out.epics = epics.length;
  } catch {}
  try {
    const features = parseJsonOrNull(context.features_json);
    if (Array.isArray(features)) out.features = features.length;
  } catch {}
  try {
    const stories = parseJsonOrNull(context.stories_json);
    if (Array.isArray(stories)) out.stories = stories.length;
  } catch {}
  return out;
}

function openRunArtifact(runId, section, event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  openRun(runId, section);
}

function getActiveStepId(run) {
  if (!run.steps || !run.steps.length) return null;
  const active = run.steps.find(s => s.status !== 'done' && s.status !== 'skipped');
  return active ? active.step_id : run.steps[run.steps.length - 1].step_id;
}

function renderBoard(wf, runs) {
  const board = document.getElementById('board');
  const columns = {};
  wf.steps.forEach(s => { columns[s.id] = []; });

  runs.forEach(run => {
    const stepId = getActiveStepId(run);
    const col = stepId && columns[stepId] !== undefined ? stepId : wf.steps[wf.steps.length - 1]?.id;
    if (col && columns[col]) columns[col].push(run);
  });

  board.innerHTML = wf.steps.map(step => {
    const cards = columns[step.id];
    const cardHTML = cards.length === 0
      ? '<div class="empty">No runs</div>'
      : cards.map(run => {
          const runStatus = normalizeBadgeStatus(run.status);
          const isDone = runStatus === 'done' || runStatus === 'completed';
          const isFailed = runStatus === 'failed' || runStatus === 'error';
          const cls = isDone ? 'done' : isFailed ? 'failed' : '';
          const badge = `badge-${runStatus}`;
          const time = run.updated_at ? parseTS(run.updated_at)?.toLocaleString() || "" : '';
          const title = run.task.length > 60 ? run.task.slice(0, 57) + '…' : run.task;
          const safeRunId = encodeURIComponent(String(run.id || ""));
          const artifacts = artifactCountsForRun(run);
          const links = [];
          if (artifacts.epics > 0) links.push(`<a class="card-link" href="?run=${safeRunId}&artifact=epics" onclick="openRunArtifact(decodeURIComponent('${safeRunId}'),'epics',event)">Epics ${artifacts.epics}</a>`);
          if (artifacts.features > 0) links.push(`<a class="card-link" href="?run=${safeRunId}&artifact=features" onclick="openRunArtifact(decodeURIComponent('${safeRunId}'),'features',event)">Features ${artifacts.features}</a>`);
          if (artifacts.stories > 0) links.push(`<a class="card-link" href="?run=${safeRunId}&artifact=stories" onclick="openRunArtifact(decodeURIComponent('${safeRunId}'),'stories',event)">Stories ${artifacts.stories}</a>`);
          const linksHtml = links.length ? `<div class="card-links">${links.join('')}</div>` : '';
          return `<div class="card ${cls}" onclick="openRun(decodeURIComponent('${safeRunId}'))">
            <div class="card-title" title="${escAttr(run.task)}">${esc(title)}</div>
            <div class="card-meta">
              <span class="badge ${badge}">${esc(String(run.status || ''))}</span>
              <span>${esc(time)}</span>
            </div>
            ${linksHtml}
          </div>`;
        }).join('');
    return `<div class="column">
      <div class="column-header">${esc(step.id)}<span class="count">${cards.length}</span></div>
      <div class="cards">${cardHTML}</div>
    </div>`;
  }).join('');
}

const stepIcons = {done:'✓',running:'●',pending:'○',waiting:'◌',failed:'✗',error:'✗'};
const allowedBadgeStatuses = new Set(['running', 'done', 'completed', 'failed', 'error', 'waiting', 'pending', 'blocked', 'cancelled']);
function normalizeBadgeStatus(status) {
  const value = String(status || '').toLowerCase();
  if (allowedBadgeStatuses.has(value)) return value;
  return 'waiting';
}
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return esc(s).replace(/'/g, '&#39;'); }
// Normalize SQLite datetime('now') format (no T/Z) to proper ISO 8601 UTC
function parseTS(ts) { if (!ts) return null; if (!ts.endsWith('Z') && !ts.includes('+')) ts = ts.replace(' ', 'T') + 'Z'; return new Date(ts); }

function titleForItem(item) {
  if (!item || typeof item !== 'object') return '';
  return item.title || item.name || item.epicTitle || item.id || '';
}

function renderPlanningArtifacts(artifacts) {
  const epics = Array.isArray(artifacts?.epics) ? artifacts.epics : [];
  const features = Array.isArray(artifacts?.features) ? artifacts.features : [];
  const featuresByEpic = Array.isArray(artifacts?.featuresByEpic) ? artifacts.featuresByEpic : [];
  const stories = Array.isArray(artifacts?.stories) ? artifacts.stories : [];

  const featureCountFromGroups = featuresByEpic.reduce((sum, row) => {
    if (row && Array.isArray(row.features)) return sum + row.features.length;
    return sum;
  }, 0);
  const featureCount = features.length > 0 ? features.length : featureCountFromGroups;
  const epicCount = epics.length > 0 ? epics.length : featuresByEpic.length;

  if (!epicCount && !featureCount && !stories.length) return '';

  const epicPreview = epics.slice(0, 4).map((e, i) => `${i + 1}. ${esc(titleForItem(e) || `Epic ${i + 1}`)}`).join('<br>');
  const featurePreviewSource = features.length > 0 ? features : featuresByEpic.flatMap((row) => Array.isArray(row.features) ? row.features : []);
  const featurePreview = featurePreviewSource.slice(0, 5).map((f, i) => `${i + 1}. ${esc(titleForItem(f) || `Feature ${i + 1}`)}`).join('<br>');
  const storyPreview = stories.slice(0, 6).map((s, i) => `${i + 1}. ${esc(titleForItem(s) || `Story ${i + 1}`)}`).join('<br>');

  const epicList = epics.map((e, i) => `<li style="margin-bottom:4px">${esc(titleForItem(e) || `Epic ${i + 1}`)}</li>`).join('');
  const featureList = featurePreviewSource.map((f, i) => `<li style="margin-bottom:4px">${esc(titleForItem(f) || `Feature ${i + 1}`)}</li>`).join('');
  const storyList = stories.map((s, i) => `<li style="margin-bottom:4px">${esc(titleForItem(s) || `Story ${i + 1}`)}</li>`).join('');

  const jumpLinks = [
    epicCount ? `<a class="card-link" href="#artifact-epics" onclick="jumpToArtifact('epics',event)">Epics</a>` : '',
    featureCount ? `<a class="card-link" href="#artifact-features" onclick="jumpToArtifact('features',event)">Features</a>` : '',
    stories.length ? `<a class="card-link" href="#artifact-stories" onclick="jumpToArtifact('stories',event)">Stories</a>` : '',
  ].filter(Boolean).join('');

  return `
    <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px">
      <h3 style="font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:10px">Planning Output</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
        <span class="badge badge-completed">epics: ${epicCount}</span>
        <span class="badge badge-completed">features: ${featureCount}</span>
        ${stories.length ? `<span class="badge badge-completed">stories: ${stories.length}</span>` : ''}
      </div>
      ${jumpLinks ? `<div class="card-links" style="margin-bottom:10px">${jumpLinks}</div>` : ''}
      ${epicPreview ? `<div id="artifact-epics" data-artifact-section="epics" style="font-size:12px;color:var(--text-secondary);margin-bottom:8px"><strong style="color:var(--text-primary)">Epics</strong><br>${epicPreview}${epicList ? `<details style="margin-top:6px"><summary style="cursor:pointer">View all epics</summary><ol style="margin-top:6px;padding-left:18px">${epicList}</ol></details>` : ''}</div>` : ''}
      ${featurePreview ? `<div id="artifact-features" data-artifact-section="features" style="font-size:12px;color:var(--text-secondary);margin-bottom:8px"><strong style="color:var(--text-primary)">Features</strong><br>${featurePreview}${featureList ? `<details style="margin-top:6px"><summary style="cursor:pointer">View all features</summary><ol style="margin-top:6px;padding-left:18px">${featureList}</ol></details>` : ''}</div>` : ''}
      ${storyPreview ? `<div id="artifact-stories" data-artifact-section="stories" style="font-size:12px;color:var(--text-secondary)"><strong style="color:var(--text-primary)">Stories</strong><br>${storyPreview}${storyList ? `<details style="margin-top:6px"><summary style="cursor:pointer">View all stories</summary><ol style="margin-top:6px;padding-left:18px">${storyList}</ol></details>` : ''}</div>` : ''}
    </div>
  `;
}

function jumpToArtifact(section, event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  const normalized = normalizeArtifactSection(section);
  pendingArtifactSection = normalized;
  scrollToPendingArtifactSection();
  if (currentRunId) setRunQuery(currentRunId, normalized);
}

function scrollToPendingArtifactSection() {
  const id = artifactAnchorId(pendingArtifactSection);
  if (!id) return;
  const node = document.getElementById(id);
  if (!node) return;
  node.scrollIntoView({ behavior: 'smooth', block: 'start' });
  pendingArtifactSection = null;
}

function formatDurationSeconds(seconds) {
  const total = Math.max(0, Math.round(Number(seconds) || 0));
  const min = Math.floor(total / 60);
  const sec = total % 60;
  if (min === 0) return `${sec}s`;
  if (min < 60) return `${min}m ${sec}s`;
  const hr = Math.floor(min / 60);
  const rem = min % 60;
  return `${hr}h ${rem}m`;
}

function normalizeHealthLevel(level) {
  const raw = String(level || '').toLowerCase();
  return raw === 'critical' ? 'critical' : 'warning';
}

function renderRunHealthSignals(signals) {
  if (!Array.isArray(signals) || signals.length === 0) return '';
  const rows = signals.map(signal => {
    const level = normalizeHealthLevel(signal.level);
    const age = formatDurationSeconds(signal.ageSeconds);
    const stepId = signal.stepId ? `Step ${signal.stepId}` : 'Running step';
    const agent = signal.agentId ? ` (${signal.agentId})` : '';
    const cause = signal.causeHint ? ` — ${signal.causeHint}` : '';
    return `<div class="run-health-row ${level}">
      <span class="badge badge-${level}">${level}</span>
      <span style="font-family:'Geist Mono',monospace;font-size:11px;color:var(--text-secondary)">${age}</span>
      <span class="run-health-text">${esc(`${stepId}${agent}${cause}`)}</span>
    </div>`;
  }).join('');
  return `<div class="run-health">
    <div class="run-health-title">Run Health</div>
    <div class="run-health-list">${rows}</div>
  </div>`;
}

async function openRun(id, artifactSection) {
  // Reset any prior refresh timer before opening a new run.
  if (panelRefreshInterval) {
    clearInterval(panelRefreshInterval);
    panelRefreshInterval = null;
  }

  currentRunId = id;
  pendingArtifactSection = normalizeArtifactSection(artifactSection);
  setRunQuery(id, pendingArtifactSection);
  await refreshPanel();
  connectRunEventStream(id);
  panelRefreshInterval = setInterval(refreshPanel, 15000);
}

async function shareRunRecap() {
  if (!currentRunId) return;
  const btn = document.getElementById('share-btn');
  const originalLabel = btn ? btn.textContent : '';
  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Copying...';
  }

  try {
    const payload = await fetchJSON(`/api/runs/${currentRunId}/share`);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(payload.shareText);
    } else {
      window.prompt('Copy run recap:', payload.shareText);
    }
    await fetchJSON(`/api/runs/${currentRunId}/share-copied`, { method: 'POST' });
    setShareStatus('Copied run recap');
  } catch {
    setShareStatus('Could not copy recap', true);
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = originalLabel || 'Copy run recap';
    }
  }
}

async function refreshPanel() {
  if (!currentRunId) return;
  captureThinkingScrollState();

  const run = await fetchJSON(`/api/runs/${currentRunId}`);
  const artifacts = await fetchJSON(`/api/runs/${currentRunId}/artifacts`).catch(() => ({}));
  const nextPhasePayload = await fetchJSON(`/api/runs/${currentRunId}/next-phase`).catch(() => ({ suggestion: null }));
  currentNextPhaseSuggestion = nextPhasePayload && nextPhasePayload.suggestion ? nextPhasePayload.suggestion : null;
  const panel = document.getElementById('panel');
  const created = run.created_at ? parseTS(run.created_at)?.toLocaleString() || "" : '';
  const updated = run.updated_at ? parseTS(run.updated_at)?.toLocaleString() || "" : '';
  const planningHtml = renderPlanningArtifacts(artifacts);
  const runHealthHtml = renderRunHealthSignals(run.stuckSignals || []);
  const nextPhaseLabel = currentNextPhaseSuggestion && currentNextPhaseSuggestion.label
    ? String(currentNextPhaseSuggestion.label)
    : 'Move to next phase';
  const nextPhaseButtonHtml = currentNextPhaseSuggestion
    ? `<button class="control-btn" id="action-next-phase-btn" onclick="applyNextPhase()">${esc(nextPhaseLabel)}</button>`
    : '';
  const nextPhaseReasonHtml = (currentNextPhaseSuggestion && currentNextPhaseSuggestion.reason)
    ? `<div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">${esc(String(currentNextPhaseSuggestion.reason))}</div>`
    : '';
  const stepsHTML = (run.steps || []).map(s => {
    const st = normalizeBadgeStatus(s.status || 'waiting');
    const icon = stepIcons[st] || '○';
    const hasOutput = !!s.output;
    const toggleAttr = hasOutput ? `onclick="this.querySelector('.step-details').classList.toggle('step-open');this.querySelector('.step-chevron').classList.toggle('step-chevron-open')" style="cursor:pointer"` : '';
    return `<div class="step-row" style="flex-direction:column;align-items:stretch;gap:0;padding:0;overflow:hidden" ${toggleAttr}>
      <div style="display:flex;align-items:center;gap:8px;padding:10px 12px">
        <div class="step-icon ${st}">${icon}</div>
        <div class="step-name" style="flex:1">${esc(s.step_id)}</div>
        <div class="step-agent">${esc(s.agent_id || '')}</div>
        <div class="step-status"><span class="badge badge-${st}">${st}</span></div>
        ${hasOutput ? '<span class="step-chevron" style="color:var(--text-secondary);font-size:10px;transition:transform .15s;display:inline-block">▶</span>' : ''}
      </div>
      ${hasOutput ? `<div class="step-details" style="display:none;padding:0 12px 12px 44px;font-size:12px;color:var(--text-tertiary);line-height:1.6">
        <details style="margin-top:4px" onclick="event.stopPropagation()"><summary style="font-size:11px;color:var(--text-secondary);cursor:pointer;font-weight:500">Output</summary><pre style="margin-top:6px;padding:8px;background:var(--bg-code);border:1px solid var(--border);border-radius:4px;font-family:'Geist Mono',monospace;font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto">${esc(s.output)}</pre></details>
      </div>` : ''}
    </div>`;
  }).join('');
  const runBadge = normalizeBadgeStatus(run.status);
  panel.innerHTML = `
    <button class="panel-close" onclick="closePanel()">✕</button>
    <h2>${esc(run.workflow_id)}</h2>
    <div class="panel-task">${esc(run.task)}</div>
    <div class="panel-meta">
      <span><span class="badge badge-${runBadge}">${esc(String(run.status || ''))}</span></span>
      <span>Created: ${esc(created)}</span>
      <span>Updated: ${esc(updated)}</span>
    </div>
    <div class="panel-actions">
      <button class="share-btn" id="share-btn" onclick="shareRunRecap()">Copy run recap</button>
      ${run.status === 'running' ? '<button class="control-btn warn" id="action-stop-btn" onclick="invokeRunAction(\'stop\')">Stop run</button>' : ''}
      ${run.status === 'failed' ? '<button class="control-btn" id="action-resume-btn" onclick="invokeRunAction(\'resume\')">Resume run</button>' : ''}
      ${(run.status === 'failed' || run.status === 'running') ? '<button class="control-btn" id="action-retry-btn" onclick="invokeRunAction(\'retryStory\')">Retry failed story</button>' : ''}
      ${nextPhaseButtonHtml}
      <span class="share-status" id="panel-status"></span>
      <span class="share-status" id="share-status"></span>
    </div>
    ${nextPhaseReasonHtml}
    ${runHealthHtml}
    <div class="steps-list">${stepsHTML}</div>
    ${planningHtml}
    <div id="stories-panel"></div>
    <div id="agent-thinking-panel"></div>
    <div id="activity-panel"></div>
  `;
  document.getElementById('overlay').classList.add('open');
  if (pendingArtifactSection) {
    setTimeout(scrollToPendingArtifactSection, 30);
  }
  loadStories(currentRunId);
  loadActivity(currentRunId);
}

function formatEventDesc(evt) {
  const e = evt.event;
  const story = evt.storyTitle ? `${evt.storyId}: "${evt.storyTitle}"` : evt.storyId || '';
  switch (e) {
    case 'run.started': return 'Run started';
    case 'run.completed': return 'Run completed ✅';
    case 'run.failed': return 'Run failed ❌';
    case 'run.cancelled': return 'Run cancelled';
    case 'run.share.clicked': return 'Share recap opened';
    case 'run.share.copied': return 'Share recap copied';
    case 'step.pending': return `Step pending`;
    case 'step.running': return `Claimed step`;
    case 'step.done': return `Step completed`;
    case 'step.failed': return `Step failed` + (evt.detail ? `: ${evt.detail.slice(0,80)}` : '');
    case 'step.timeout': return `Step timed out` + (evt.detail ? ` — ${evt.detail}` : '');
    case 'step.integrity': return `Integrity guard` + (evt.detail ? ` — ${evt.detail.slice(0,100)}` : '');
    case 'step.stuck': return `Step appears stuck` + (evt.detail ? ` — ${evt.detail.slice(0,100)}` : '');
    case 'story.started': return `Claimed story ${story}`;
    case 'story.done': return `Completed ${story}`;
    case 'story.verified': return `Verified ${story} ✅`;
    case 'story.retry': return `Retry ${story}` + (evt.detail ? ` — ${evt.detail.slice(0,80)}` : '');
    case 'story.failed': return `Story failed ${story}`;
    case 'pipeline.advanced': return `Pipeline advanced`;
    default: return e;
  }
}

function truncateText(input, maxLen = 180) {
  const text = String(input || '').trim();
  if (!text) return '';
  if (text.length <= maxLen) return text;
  return `${text.slice(0, maxLen - 1)}…`;
}

function formatAgo(dateObj) {
  if (!dateObj || Number.isNaN(dateObj.getTime())) return '';
  const diffMs = Math.max(0, Date.now() - dateObj.getTime());
  const sec = Math.floor(diffMs / 1000);
  if (sec < 5) return 'now';
  if (sec < 60) return `${sec}s ago`;
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  return `${day}d ago`;
}

function captureThinkingScrollState() {
  if (!currentRunId) return;
  const body = document.getElementById('thinking-window-body');
  if (!body) return;
  const distanceFromBottom = body.scrollHeight - body.scrollTop - body.clientHeight;
  thinkingStickBottomByRun.set(currentRunId, distanceFromBottom <= 24);
  thinkingScrollTopByRun.set(currentRunId, body.scrollTop);
}

function normalizeAgentName(agentId) {
  const raw = String(agentId || '').trim();
  if (!raw) return '';
  const slashNormalized = raw.includes('/') ? raw.split('/').pop() : raw;
  const underscoreIdx = slashNormalized.indexOf('_');
  if (underscoreIdx > 0 && underscoreIdx < slashNormalized.length - 1) {
    return slashNormalized.slice(underscoreIdx + 1);
  }
  return slashNormalized;
}

function thoughtForEvent(evt) {
  const story = evt.storyTitle ? `${evt.storyId || 'story'} (${evt.storyTitle})` : (evt.storyId ? `story ${evt.storyId}` : '');
  switch (evt.event) {
    case 'step.running':
      return evt.stepId ? `Working on step ${evt.stepId}` : 'Working on current step';
    case 'step.pending':
      return evt.stepId ? `Queued for step ${evt.stepId}` : 'Queued for next step';
    case 'story.started':
      return story ? `Implementing ${story}` : 'Implementing current story';
    case 'story.done':
      return story ? `Finished ${story}` : 'Finished current story';
    case 'story.verified':
      return 'Verifying completed story';
    case 'story.retry':
      return evt.detail ? `Reworking after verify feedback: ${evt.detail}` : 'Reworking story after verify feedback';
    case 'step.timeout':
      return evt.detail ? `Timed out: ${evt.detail}` : 'Step timed out';
    case 'step.failed':
      return evt.detail ? `Blocked: ${evt.detail}` : 'Step failed';
    case 'step.integrity':
      return evt.detail ? `Integrity guard: ${evt.detail}` : 'Integrity guard triggered';
    case 'step.stuck':
      return evt.detail ? `Likely stuck: ${evt.detail}` : 'Step likely stuck';
    case 'pipeline.advanced':
      return evt.stepId ? `Handed off to ${evt.stepId}` : 'Handed off to next step';
    case 'run.cancelled':
      return evt.detail ? `Run cancelled: ${evt.detail}` : 'Run cancelled';
    default:
      if (evt.detail) return evt.detail;
      return formatEventDesc(evt);
  }
}

function laneForEvent(evt, thoughtText) {
  const eventName = String(evt.event || '').toLowerCase();
  const step = String(evt.stepId || '').toLowerCase();
  const detail = String(evt.detail || '').toLowerCase();
  const thought = String(thoughtText || '').toLowerCase();
  const combined = `${step} ${detail} ${thought}`.trim();

  if (eventName === 'pipeline.advanced') return 'handoff';
  if (eventName === 'step.failed' || eventName === 'story.failed' || eventName === 'run.failed' || eventName === 'run.cancelled' || eventName === 'step.timeout' || eventName === 'step.integrity' || eventName === 'step.stuck') return 'blocked';
  if (eventName === 'story.verified' || step.includes('verify') || step.includes('test')) return 'verify';
  if (eventName === 'story.started' || eventName === 'story.done' || eventName === 'story.retry') return 'build';
  if (step.includes('implement') || step.includes('build') || step.includes('bootstrap')) return 'build';
  if (step.includes('ideate') || step.includes('plan') || step.includes('scan') || /analy|explor|discover|research|inspect|audit/.test(combined)) return 'explore';
  if (/implement|build|code|patch|fix|refactor|ship|deliver/.test(combined)) return 'build';
  if (/verify|test|validate|assert|qa|review/.test(combined)) return 'verify';
  return 'think';
}

function laneLabel(lane) {
  switch (lane) {
    case 'explore': return 'exploring';
    case 'build': return 'building';
    case 'verify': return 'verifying';
    case 'handoff': return 'handoff';
    case 'blocked': return 'blocked';
    default: return 'thinking';
  }
}

function renderAgentPulse(events) {
  const panel = document.getElementById('agent-thinking-panel');
  if (!panel) return;
  if (!events || events.length === 0) {
    panel.innerHTML = `
      <div class="thinking-window">
        <div class="thinking-header">
          <h3 style="font-size:15px;font-weight:600;color:var(--text-primary)">Live Thinking Stream</h3>
          <div class="thinking-live"><span class="thinking-dot"></span><span>idle</span></div>
        </div>
        <div class="thinking-stream">
          <div class="thinking-empty">Waiting for agent activity...</div>
        </div>
      </div>
    `;
    return;
  }

  const latestByAgent = new Map();
  for (const evt of events) {
    if (!evt || !evt.agentId) continue;
    const key = String(evt.agentId);
    const ts = parseTS(evt.ts);
    const timeValue = ts ? ts.getTime() : 0;
    const prev = latestByAgent.get(key);
    if (!prev || timeValue >= prev.timeValue) {
      latestByAgent.set(key, { evt, ts, timeValue });
    }
  }

  if (latestByAgent.size === 0) {
    panel.innerHTML = `
      <div class="thinking-window">
        <div class="thinking-header">
          <h3 style="font-size:15px;font-weight:600;color:var(--text-primary)">Live Thinking Stream</h3>
          <div class="thinking-live"><span class="thinking-dot"></span><span>idle</span></div>
        </div>
        <div class="thinking-stream">
          <div class="thinking-empty">No agent thoughts captured yet.</div>
        </div>
      </div>
    `;
    return;
  }

  const summaryRows = Array.from(latestByAgent.values())
    .sort((a, b) => b.timeValue - a.timeValue)
    .map(({ evt, ts }) => {
      const agent = normalizeAgentName(evt.agentId);
      const thought = truncateText(thoughtForEvent(evt));
      const age = ts ? formatAgo(ts) : '';
      return `<div class="thinking-summary-row">
        <span class="thinking-summary-agent">${esc(agent || String(evt.agentId || 'agent'))}</span>
        <span class="thinking-summary-text">${esc(thought)}</span>
        <span class="thinking-summary-time">${esc(age)}</span>
      </div>`;
    }).join('');

  const thoughtEvents = events.filter(evt => evt && evt.event);
  const thoughtRows = thoughtEvents.map(evt => {
    const ts = parseTS(evt.ts);
    const timeLabel = ts ? ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';
    const age = ts ? formatAgo(ts) : '';
    const thought = String(thoughtForEvent(evt) || '').trim();
    const detailRaw = String(evt.detail || '').trim();
    const detail = detailRaw && detailRaw !== thought ? detailRaw : '';
    const lane = laneForEvent(evt, thought);
    const laneTag = laneLabel(lane);
    const agent = normalizeAgentName(evt.agentId);
    return `<div class="thinking-row lane-${lane}">
      <div class="thinking-meta">
        <span class="thinking-agent">${esc(agent || String(evt.agentId || 'system'))}</span>
        <span class="thinking-lane">${esc(laneTag)}</span>
        <span class="thinking-time">${esc(timeLabel || age)}</span>
      </div>
      <div class="thinking-message">${esc(thought)}</div>
      ${detail ? `<div class="thinking-detail">${esc(detail)}</div>` : ''}
    </div>`;
  }).join('');

  const latestTs = parseTS(events[events.length - 1]?.ts);
  const latestAge = latestTs ? formatAgo(latestTs) : '';
  const isLive = latestTs ? ((Date.now() - latestTs.getTime()) <= 15000) : false;
  const liveLabel = isLive ? 'live' : (latestAge ? `last update ${latestAge}` : 'idle');

  panel.innerHTML = `
    <div class="thinking-window">
      <div class="thinking-header">
        <h3 style="font-size:15px;font-weight:600;color:var(--text-primary)">Live Thinking Stream</h3>
        <div class="thinking-live">
          <span class="thinking-dot ${isLive ? 'is-live' : ''}"></span>
          <span>${esc(liveLabel)}</span>
        </div>
      </div>
      <div class="thinking-summary">${summaryRows}</div>
      <div class="thinking-stream" id="thinking-window-body">${thoughtRows || '<div class="thinking-empty">No events yet.</div>'}</div>
    </div>
  `;

  const body = document.getElementById('thinking-window-body');
  if (body && currentRunId) {
    const stickBottom = thinkingStickBottomByRun.has(currentRunId) ? thinkingStickBottomByRun.get(currentRunId) : true;
    const savedTop = thinkingScrollTopByRun.get(currentRunId) || 0;
    if (stickBottom) body.scrollTop = body.scrollHeight;
    else body.scrollTop = savedTop;
    body.addEventListener('scroll', () => {
      if (!currentRunId) return;
      const distanceFromBottom = body.scrollHeight - body.scrollTop - body.clientHeight;
      thinkingStickBottomByRun.set(currentRunId, distanceFromBottom <= 24);
      thinkingScrollTopByRun.set(currentRunId, body.scrollTop);
    }, { passive: true });
  }
}

async function loadActivity(runId) {
  const events = await fetchJSON(`/api/runs/${runId}/events?limit=5000`);
  const panel = document.getElementById('activity-panel');
  renderAgentPulse(events);
  if (!events || events.length === 0) { panel.innerHTML = ''; return; }
  const rows = events.map(evt => {
    const t = parseTS(evt.ts);
    const time = t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const agent = evt.agentId ? evt.agentId.split('/').pop() : '';
    const desc = formatEventDesc(evt);
    const agentSpan = agent
      ? `<span style="color:var(--accent-teal);font-family:'Geist Mono',monospace;flex-shrink:0">${esc(agent)}</span>`
      : '';
    return `<div style="display:flex;gap:12px;padding:4px 0;font-size:12px;line-height:1.5;border-bottom:1px solid var(--border-light)">
      <span style="color:var(--text-secondary);font-family:'Geist Mono',monospace;flex-shrink:0;min-width:44px">${time}</span>
      ${agentSpan}
      <span style="color:var(--text-primary)">${esc(desc)}</span>
    </div>`;
  }).join('');
  panel.innerHTML = `
    <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px">
      <h3 style="font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:12px">Activity</h3>
      <div style="max-height:300px;overflow-y:auto">${rows}</div>
    </div>
  `;
}

function closePanel() {
  if (panelRefreshInterval) {
    clearInterval(panelRefreshInterval);
    panelRefreshInterval = null;
  }
  if (panelRefreshQueued) {
    clearTimeout(panelRefreshQueued);
    panelRefreshQueued = null;
  }
  if (runEventsSource) {
    try { runEventsSource.close(); } catch {}
    runEventsSource = null;
  }
  if (currentRunId) {
    thinkingScrollTopByRun.delete(currentRunId);
    thinkingStickBottomByRun.delete(currentRunId);
  }
  currentRunId = null;
  pendingArtifactSection = null;
  setRunQuery(null, null);
  document.getElementById('overlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

async function loadStories(runId) {
  const stories = await fetchJSON(`/api/runs/${runId}/stories`);
  const panel = document.getElementById('stories-panel');
  if (!stories || stories.length === 0) { panel.innerHTML = ''; return; }
  const done = stories.filter(s => s.status === 'done').length;
  const pct = Math.round((done / stories.length) * 100);
  panel.innerHTML = `
    <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3 style="font-size:15px;font-weight:600;color:var(--text-primary)">Stories</h3>
        <span style="font-size:13px;font-weight:600;color:var(--accent-green)">${done} / ${stories.length} done</span>
      </div>
      <div style="background:var(--accent-muted);border-radius:4px;height:8px;margin-bottom:16px;overflow:hidden">
        <div style="background:var(--accent-green);height:100%;width:${pct}%;border-radius:4px;transition:width .3s"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${stories.map((s, i) => {
          const st = normalizeBadgeStatus(s.status || 'pending');
          const icon = stepIcons[st] || '○';
          let ac = [];
          try { ac = JSON.parse(s.acceptance_criteria || '[]'); } catch { ac = [s.acceptance_criteria]; }
          const retryInfo = s.retry_count > 0 ? ` <span style="color:var(--accent-orange);font-size:10px">(retry ${s.retry_count})</span>` : '';
          const hasDetails = s.description || ac.length > 0 || s.output;
          const toggleAttr = hasDetails ? `onclick="this.querySelector('.story-details').classList.toggle('story-open');this.querySelector('.story-chevron').classList.toggle('story-chevron-open')" style="cursor:pointer"` : '';
          return `<div class="step-row" style="flex-direction:column;align-items:stretch;gap:0;padding:0;overflow:hidden" ${toggleAttr}>
            <div style="display:flex;align-items:center;gap:8px;padding:10px 12px">
              <div class="step-icon ${st}">${icon}</div>
              <div class="step-name" style="flex:1">${esc(s.story_id)}: ${esc(s.title)}${retryInfo}</div>
              <div class="step-status"><span class="badge badge-${st}">${st}</span></div>
              ${hasDetails ? '<span class="story-chevron" style="color:var(--text-secondary);font-size:10px;transition:transform .15s;display:inline-block">▶</span>' : ''}
            </div>
            ${hasDetails ? `<div class="story-details" style="display:none;padding:0 12px 12px 44px;font-size:12px;color:var(--text-tertiary);line-height:1.6">
              ${s.description ? `<div style="margin-bottom:8px">${esc(s.description)}</div>` : ''}
              ${ac.length > 0 ? `<div style="margin-bottom:8px"><div style="font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--accent-green);margin-bottom:4px">Acceptance Criteria</div>${ac.map(c => `<label style="display:flex;align-items:flex-start;gap:6px;margin-bottom:3px;cursor:default"><span style="color:var(${st==='done'?'--accent-green':'--border'});flex-shrink:0">${st==='done'?'☑':'☐'}</span><span>${esc(c)}</span></label>`).join('')}</div>` : ''}
              ${s.output ? `<details style="margin-top:4px" onclick="event.stopPropagation()"><summary style="font-size:11px;color:var(--text-secondary);cursor:pointer;font-weight:500">Output</summary><pre style="margin-top:6px;padding:8px;background:var(--bg-code);border:1px solid var(--border);border-radius:4px;font-family:'Geist Mono',monospace;font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto">${esc(s.output)}</pre></details>` : ''}
            </div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

document.getElementById('wf-select').addEventListener('change', e => {
  manualWorkflowSelection = true;
  selectWorkflow(e.target.value);
});
document.getElementById('idea-input').addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    startIdeaRun();
  }
});
document.getElementById('idea-input').addEventListener('input', () => queueIntentRecommendationRefresh());
loadWorkflows();
setInterval(() => { if (currentWf) loadRuns(); }, 30000);

// ── Medic ───────────────────────────────────────────────────────
let medicPanelOpen = false;

function toggleMedicPanel() {
  medicPanelOpen = !medicPanelOpen;
  document.getElementById('medic-panel').classList.toggle('open', medicPanelOpen);
  if (medicPanelOpen) loadMedicData();
}

document.addEventListener('click', e => {
  if (!medicPanelOpen) return;
  const panel = document.getElementById('medic-panel');
  const badge = document.getElementById('medic-badge');
  if (!panel.contains(e.target) && !badge.contains(e.target)) {
    medicPanelOpen = false;
    panel.classList.remove('open');
  }
});

async function loadMedicStatus() {
  try {
    const status = await fetchJSON('/api/medic/status');
    const dot = document.getElementById('medic-dot');
    const label = document.getElementById('medic-label');

    if (!status.installed || !status.lastCheck) {
      dot.className = 'medic-dot unknown';
      label.textContent = 'Medic';
      return;
    }

    const ageMin = Math.round((Date.now() - parseTS(status.lastCheck.checkedAt).getTime()) / 60000);
    const hasIssues = status.lastCheck.issuesFound > 0;
    const isStale = ageMin > 10;

    if (hasIssues && status.lastCheck.actionsTaken < status.lastCheck.issuesFound) {
      dot.className = 'medic-dot critical';
      label.textContent = `${status.lastCheck.issuesFound} issue(s)`;
    } else if (isStale) {
      dot.className = 'medic-dot warning';
      label.textContent = `${ageMin}m ago`;
    } else if (hasIssues) {
      dot.className = 'medic-dot warning';
      label.textContent = `${status.lastCheck.issuesFound} fixed`;
    } else {
      dot.className = 'medic-dot healthy';
      label.textContent = `${ageMin}m ago`;
    }
  } catch {
    document.getElementById('medic-dot').className = 'medic-dot unknown';
    document.getElementById('medic-label').textContent = 'Medic';
  }
}

async function loadMedicData() {
  const body = document.getElementById('medic-panel-body');
  try {
    const [status, checks] = await Promise.all([
      fetchJSON('/api/medic/status'),
      fetchJSON('/api/medic/checks?limit=10'),
    ]);

    let html = '';
    html += '<div style="margin-bottom:12px">';
    if (status.lastCheck) {
      const ageMin = Math.round((Date.now() - parseTS(status.lastCheck.checkedAt).getTime()) / 60000);
      html += `<div class="medic-stat"><span>Last check</span><span class="medic-stat-value">${ageMin}m ago</span></div>`;
      html += `<div class="medic-stat"><span>Result</span><span class="medic-stat-value">${esc(status.lastCheck.summary)}</span></div>`;
    } else {
      html += '<div class="medic-stat"><span>Last check</span><span class="medic-stat-value">Never</span></div>';
    }
    html += `<div class="medic-stat"><span>Checks (24h)</span><span class="medic-stat-value">${status.recentChecks}</span></div>`;
    html += `<div class="medic-stat"><span>Issues found (24h)</span><span class="medic-stat-value">${status.recentIssues}</span></div>`;
    html += `<div class="medic-stat"><span>Auto-fixed (24h)</span><span class="medic-stat-value">${status.recentActions}</span></div>`;
    html += '</div>';

    if (checks.length > 0) {
      html += '<div style="font-size:12px;font-weight:600;color:var(--text-primary);margin-bottom:8px">Recent Checks</div>';
      for (const c of checks) {
        const t = parseTS(c.checkedAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
        const icon = c.issuesFound === 0 ? '·' : c.actionsTaken > 0 ? '~' : '!';
        const color = c.issuesFound === 0 ? 'var(--text-secondary)' : c.actionsTaken >= c.issuesFound ? 'var(--accent-teal)' : 'var(--accent-orange)';
        html += `<div class="medic-check-row">
          <span class="medic-check-time">${t}</span>
          <span class="medic-check-summary" style="color:${color}">${icon} ${esc(c.summary)}</span>
        </div>`;
      }
    }

    body.innerHTML = html || '<div style="color:var(--text-secondary);font-size:12px;padding:8px 0">No medic data yet. Run <code>shippulse medic install</code> to enable.</div>';
  } catch {
    body.innerHTML = '<div style="color:var(--text-secondary);font-size:12px;padding:8px 0">Could not load medic data.</div>';
  }
}

loadMedicStatus();
setInterval(loadMedicStatus, 30000);

// ── Theme toggle ──────────────────────────────────────────────────
(function initTheme() {
  const btn = document.getElementById('theme-toggle');
  const root = document.documentElement;
  const STORAGE_KEY = 'shippulse-theme';

  function getEffectiveTheme() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) return stored;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    btn.textContent = theme === 'dark' ? '🌙' : '☀️';
    btn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
  }

  applyTheme(getEffectiveTheme());

  btn.addEventListener('click', () => {
    const current = root.getAttribute('data-theme') || getEffectiveTheme();
    const next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem(STORAGE_KEY, next);
    applyTheme(next);
  });

  // Update if system preference changes and no manual override
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (!localStorage.getItem(STORAGE_KEY)) applyTheme(getEffectiveTheme());
  });
})();
</script>
